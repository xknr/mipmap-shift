<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>generateMipmap Phase Shift Test</title>
  <meta name="description"
    content="A tool to visualize and test WebGL generateMipmap phase shift alignment errors across different texture dimensions.">
  <meta property="og:title" content="generateMipmap Phase Shift Test">
  <meta property="og:description" content="Visualize alignment errors in WebGL mipmap generation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖼️</text></svg>">
</head>

<body>
  <div id="app-container">
    <canvas id="glCanvas"></canvas>

    <div id="ui-container">
      <div class="panel-box" id="nav-panel">
        <div id="status-bar">
          <div id="hud-line1" class="hud-line"></div>
          <div id="hud-line2" class="hud-line"></div>
          <div id="hud-hint" class="hud-hint">use arrows or left/right<br>cursor keys to show a lod level</div>
        </div>
        <div id="controls">
          <button id="btn-prev" class="nav-btn">◀</button>
          <button id="btn-next" class="nav-btn">▶</button>
        </div>
      </div>

      <div class="panel-box" id="settings-panel">
        <label for="res-select">texture size:</label>
        <select id="res-select">
          <option value="512x191">512 x 191</option>
          <option value="980x808">980 x 808</option>
          <option value="128x67">128 x 67</option>
          <option value="1920x1080">1920 x 1080</option>
          <option value="2048x980">2048 x 980</option>
          <option value="1024x1024">1024 x 1024</option>
          <option value="custom">custom...</option>
        </select>
        <div id="custom-res-controls" style="display: none;">
          <div class="input-group">
            <input type="number" id="custom-w" placeholder="w" value="1920" min="6" max="2048">
            <span>x</span>
            <input type="number" id="custom-h" placeholder="h" value="1080" min="6" max="2048">
          </div>
          <button id="btn-apply-custom" class="action-btn">apply</button>
        </div>
      </div>

      <div class="panel-box" id="action-panel">
        <button id="btn-save" class="action-btn" style="width: 100%; height: 100%;" disabled>save png</button>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
  <footer id="readme-container">
    <div id="readme-view">
      <div class="loading-spinner">loading documentation...</div>
    </div>
  </footer>
</body>

</html>
