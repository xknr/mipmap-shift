<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webgl scaler phase study</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app-container">
    <div id="main-column">
      <canvas id="glCanvas"></canvas>
      <div id="status-bar">
        <div id="hud-line1" class="hud-line"></div>
        <div id="hud-line2" class="hud-line"></div>
        <div id="hud-hint" class="hud-hint">use left/right arrows to navigate</div>
      </div>
      <div id="controls">
        <button id="btn-prev" class="nav-btn">◀</button>
        <button id="btn-next" class="nav-btn">▶</button>
      </div>
    </div>
    <div id="side-panel">
      <label for="res-select">preset resolution:</label>
      <select id="res-select">
        <option value="980x808">980 x 808</option>
        <option value="1024x1024">1024 x 1024</option>
        <option value="2048x980">2048 x 980</option>
      </select>
      <button id="btn-save" class="action-btn">save png</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>

</html>
